name: Build
on:
  push:
    branches:
    - main
    - v2
  pull_request:
    branches:
    - main
    - v2

env:
  MODULE_NAME: Alt3.Docusaurus.Powershell

jobs:
  # compile the module
  build:
    name: Build Module
    runs-on: windows-latest
    steps:
    - name: Show Powershell Version
      shell: pwsh
      run: $PSVersionTable.PSVersion

    - name: Checkout
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v4.7.0
      with:
        versionSpec: '6.x'

    - name: Execute GitVersion
      id: gitversion
      uses: gittools/actions/gitversion/execute@v4.7.0
      with:
        useConfigFile: true

    # replicates the GitVersion 5 LegacySemVerPadded format (e.g. 2.0.0-rc0001)
    # because PSGallery prerelease strings must be alphanumeric-only
    - name: Compose PSGallery compatible version
      id: version
      shell: pwsh
      run: |
        $version = '${{ steps.gitversion.outputs.majorMinorPatch }}'
        if ('${{ steps.gitversion.outputs.preReleaseLabel }}') {
          $version += '-{0}{1:d4}' -f '${{ steps.gitversion.outputs.preReleaseLabel }}', [int]'${{ steps.gitversion.outputs.preReleaseNumber }}'
        }
        Write-Output "PSGallery version = $version"
        "version=$version" >> $env:GITHUB_OUTPUT

    - name: Install required PowerShell modules
      uses: JustinGrote/ModuleFast-action@main
      with:
        path: ${{github.workspace}}/Dev/RequiredModules.psd1

    - name: Build module
      id: build
      uses: PoshCode/actions/build-module@main
      with:
        path: ${{github.workspace}}/Source
        version: ${{ steps.version.outputs.version }}
        destination: ${{github.workspace}}/output

    - name: Upload artifact Modules
      uses: actions/upload-artifact@v7
      id: upload-artifact-modules
      with:
        name: Modules
        path: ${{github.workspace}}/output

    - name: Upload artifact PesterTests
      uses: actions/upload-artifact@v7
      with:
        name: PesterTests
        path: ${{github.workspace}}/Tests

    - name: Upload artifact RequiredModules
      uses: actions/upload-artifact@v7
      with:
        name: RequiredModules
        path: ${{github.workspace}}/Dev/RequiredModules.psd1

    - name: Upload artifact PSScriptAnalyzer
      uses: actions/upload-artifact@v7
      with:
        name: PSScriptAnalyzer
        path: ${{github.workspace}}/PSScriptAnalyzerSettings.psd1

  # enforce code quality
  lint:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    needs: build
    steps:
    - name: Show Powershell Version
      shell: pwsh
      run: $PSVersionTable.PSVersion

    - name: Checkout sources
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Display folder structure
      run: ls -R

    - name: Run PSScriptAnalyzer
      id: analyze
      shell: pwsh
      run: |
        $result = Invoke-ScriptAnalyzer -Settings ./PSScriptAnalyzerSettings.psd1 -Path . -Recurse | Select-Object -Property RuleName, Severity, ScriptPath, Line, Column
        if (-not $result) {
          exit 0
        }
        $result
        Write-Output "PSScriptAnalyzer failed with $($result.count) errors"
        exit 1

  # run pester tests
  test:
    name: Pester Tests
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os:
        - windows-2022 # https://github.com/actions/runner-images
        - windows-2025
        - ubuntu-24.04
        - ubuntu-26.04
        - macos-15
        - macos-26 # macOS "Tahoe" (Apple switched to year-based version numbers)
    steps:
    - name: Show Powershell Version
      shell: pwsh
      run: $PSVersionTable.PSVersion

    - name: Download artifacts
      uses: actions/download-artifact@v8

    - name: Display structure of downloaded artifacts
      run: ls -R

    - name: Install required PowerShell modules
      uses: JustinGrote/ModuleFast-action@main
      with:
        path: ${{github.workspace}}/RequiredModules/RequiredModules.psd1 # downloaded artifact path

    - uses: PoshCode/Actions/pester@main
      with:
        codeCoveragePath: Modules/${{env.MODULE_NAME}}
        moduleUnderTest: ${{env.MODULE_NAME}}
        additionalModulePaths: ${{github.workspace}}/Modules

    - name: Upload artifact PesterResults
      uses: actions/upload-artifact@v7
      if: matrix.os == 'windows-2022' # only execute on this OS
      with:
        name: PesterResults
        path: ${{github.workspace}}/*.xml

  # -----------------------------------------------------------------------------
  # Publishing stage:
  # - is skipped completely UNLESS on the main branch (or v2 for prereleases)
  # - is skipped completely UNLESS the commit message contains "[release]"
  # - the psgallery published manifest already contains the bumped module version
  # - the bump-main step copies the artifact manifest to main to match the
  #   PSGallery-published version and regenerates the website command reference
  #   so the page footers show the released version (without adding [release]
  #   to the commit message)
  # -----------------------------------------------------------------------------
  publish:
    name: Publish
    runs-on: windows-latest
    needs: [ test, lint ]
    if: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/v2') && contains(github.event.head_commit.message, '[release]')}}

    steps:
    - name: Show Powershell Version
      shell: pwsh
      run: $PSVersionTable.PSVersion

    - name: Checkout
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v4.7.0
      with:
        versionSpec: '6.x'

    - name: Execute GitVersion
      id: gitversion
      uses: gittools/actions/gitversion/execute@v4.7.0
      with:
        useConfigFile: true

    # replicates the GitVersion 5 LegacySemVerPadded format (e.g. 2.0.0-rc0001)
    # because PSGallery prerelease strings must be alphanumeric-only
    - name: Compose PSGallery compatible version
      id: version
      shell: pwsh
      run: |
        $version = '${{ steps.gitversion.outputs.majorMinorPatch }}'
        if ('${{ steps.gitversion.outputs.preReleaseLabel }}') {
          $version += '-{0}{1:d4}' -f '${{ steps.gitversion.outputs.preReleaseLabel }}', [int]'${{ steps.gitversion.outputs.preReleaseNumber }}'
        }
        Write-Output "PSGallery version = $version"
        "version=$version" >> $env:GITHUB_OUTPUT

    - name: Download Artifacts
      uses: actions/download-artifact@v8

    # Publish-Module validates the manifest which requires the modules
    # listed in RequiredModules to be present on this runner
    - name: Install required PowerShell modules
      uses: JustinGrote/ModuleFast-action@main
      with:
        path: ${{github.workspace}}/Dev/RequiredModules.psd1

    - name: Publish to PSGallery
      uses: ./.github/actions/psgallery-publisher
      env:
        PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
      with:
        modulePath: Modules/${{env.MODULE_NAME}}

    - name: Bump Manifest Version on Main
      id: bumpMain
      if: ${{ github.ref == 'refs/heads/main' }}
      uses: ./.github/actions/bump-main
      with:
        artifactPath: Modules/${{env.MODULE_NAME}}

    - name: Create Github Release
      uses: softprops/action-gh-release@v3
      with:
        name: Release ${{ steps.version.outputs.version }}
        tag_name: ${{ steps.version.outputs.version }}
        target_commitish: ${{ github.ref_name }}
        draft: false
        prerelease: ${{ contains(steps.version.outputs.version, '-') }}
        generate_release_notes: true
